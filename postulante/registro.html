<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - People Engine</title>
    <link rel="stylesheet" href="../css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="global-header">
        <div class="logo">
            <img src="../img/PeopleEngine-logo.png" alt="People Engine Logo">
            <span class="logo-text"><strong>People</strong> <span>Engine</span></span>
        </div>
    </div>
    
    <div class="login-wrapper">
        <div class="login-container" style="max-width: 500px;">
            <div class="login-header">
                <h1>Crea tu cuenta</h1>
                <p>Únete a nosotros como candidato.</p>
            </div>

            <form id="register-form" class="login-form">
                <div class="input-group">
                    <label for="nombreCompleto">Nombre Completo</label>
                    <input type="text" id="nombreCompleto" name="nombreCompleto" required placeholder="Juan Pérez">
                </div>

                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="Ingresa tu correo">
                </div>

                <div class="input-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" required placeholder="+1 234 567 8900">
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <div class="input-group">
                    <label for="vacante">Vacante a la que postula</label>
                    <select id="vacante" name="vacante" required style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 6px; font-family: inherit; font-size: 0.95rem; background-color: #fafafa; appearance: auto;">
                        <option value="Media Buyer Coordinator">Media Buyer Coordinator</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="linkedinUrl">URL de LinkedIn</label>
                    <input type="url" id="linkedinUrl" name="linkedinUrl" required placeholder="https://linkedin.com/in/tuperfil">
                </div>

                <div class="input-group">
                    <label for="cvFile">Cargar CV</label>
                    <input type="file" id="cv_upload" name="cv_upload" accept=".pdf,.doc,.docx" required style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 6px; background-color: #fafafa;">
                </div>

                <button type="submit" class="btn-primary" id="btn-register" style="width: 100%;">Enviar postulación</button>
            </form>
            
            <div class="register-prompt" style="text-align: center; margin-top: 2rem;">
                ¿Ya tienes cuenta? <a href="../index.html">Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <footer class="global-footer">
        People Engine powered by <strong>True Digital Media®</strong> 2026
    </footer>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/registro.js"></script>
</body>
</html>
